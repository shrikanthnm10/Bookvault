AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BookVault App - CodePipeline Stack WITH Test Stage (eu-north-1 / Stockholm)
  Pipeline flow: GitHub Source → CodeBuild (Build) → CodeBuild (Test) → ECS (Deploy)
  Deploy is BLOCKED unless the Test stage succeeds.

Parameters:
  PipelineName:
    Type: String
    Default: bookvault-pipeline

  GitHubOwner:
    Type: String
    Description: GitHub repository owner (username or org)

  GitHubRepo:
    Type: String
    Default: bookvault-app

  GitHubBranch:
    Type: String
    Default: main

  CodeBuildProjectName:
    Type: String
    Default: bookvault-build
    Description: The existing CodeBuild Build project name (from stack 06)

  ECSClusterName:
    Type: String
    Default: bookvault-cluster

  ECSServiceName:
    Type: String
    Default: bookvault-service

  GitHubSecretName:
    Type: String
    Default: github-token
    Description: >
      Name of the Secrets Manager secret holding the GitHub OAuth token.
      Secret must have a key called "token".

  AWSAccountId:
    Type: String
    Description: Your 12-digit AWS Account ID

Resources:

  # ─────────────────────────────────────────
  # Artifact Bucket
  # ─────────────────────────────────────────
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "bookvault-pipeline-artifacts-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: bookvault-pipeline-artifacts

  # ─────────────────────────────────────────
  # IAM Role — CodeBuild Test Project
  # ─────────────────────────────────────────
  BookVaultTestServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: codebuild-bookvault-test-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BookVaultTestPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:eu-north-1:${AWSAccountId}:log-group:/aws/codebuild/bookvault-test"
                  - !Sub "arn:aws:logs:eu-north-1:${AWSAccountId}:log-group:/aws/codebuild/bookvault-test:*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub "${PipelineArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:CreateReportGroup
                  - codebuild:CreateReport
                  - codebuild:UpdateReport
                  - codebuild:BatchPutTestCases
                  - codebuild:BatchPutCodeCoverages
                Resource:
                  - !Sub "arn:aws:codebuild:eu-north-1:${AWSAccountId}:report-group/bookvault-test-*"

  # ─────────────────────────────────────────
  # CloudWatch Log Group — Test Project
  # ─────────────────────────────────────────
  BookVaultTestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/codebuild/bookvault-test
      RetentionInDays: 30

  # ─────────────────────────────────────────
  # CodeBuild Project — Test Stage
  # Runs pytest against the Flask app.
  # Uses testspec.yml from the repo.
  # ─────────────────────────────────────────
  BookVaultTestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: bookvault-test
      Description: "BookVault Test Stage — runs pytest suite. Deploy is blocked on failure."
      ServiceRole: !GetAtt BookVaultTestServiceRole.Arn

      Source:
        # CODEPIPELINE means CodeBuild receives the artifact from the Build stage,
        # not directly from GitHub. The testspec.yml inside the artifact is used.
        Type: CODEPIPELINE
        BuildSpec: testspec.yml

      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        PrivilegedMode: false   # No Docker needed — just Python + pytest

      Artifacts:
        Type: CODEPIPELINE

      Cache:
        Type: NO_CACHE

      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/bookvault-test
        S3Logs:
          Status: DISABLED
          EncryptionDisabled: false

      TimeoutInMinutes: 15
      QueuedTimeoutInMinutes: 30

  # ─────────────────────────────────────────
  # IAM Role — CodePipeline
  # ─────────────────────────────────────────
  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: bookvault-codepipeline-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSCodeBuildDeveloperAccess
        - arn:aws:iam::aws:policy/AmazonECS_FullAccess
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite

  # ─────────────────────────────────────────
  # CodePipeline — 4 Stages:
  #   Source → Build → Test → Deploy
  # ─────────────────────────────────────────
  BookVaultPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Ref PipelineName
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      PipelineType: V2
      ExecutionMode: SUPERSEDED

      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket

      Stages:

        # ══════════════════════════════
        # STAGE 1 — SOURCE
        # Pulls code from GitHub on push.
        # ══════════════════════════════
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: '1'
              Configuration:
                Owner: !Ref GitHubOwner
                Repo: !Ref GitHubRepo
                Branch: !Ref GitHubBranch
                OAuthToken: !Sub "{{resolve:secretsmanager:${GitHubSecretName}:SecretString:token}}"
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

        # ══════════════════════════════
        # STAGE 2 — BUILD
        # Builds Docker image, pushes to ECR.
        # Outputs: imagedefinitions.json + all source files (for Test stage).
        # ══════════════════════════════
        - Name: Build
          Actions:
            - Name: DockerBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProjectName
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

        # ══════════════════════════════
        # STAGE 3 — TEST  ← NEW
        # Runs pytest suite via testspec.yml.
        # If any test fails → pipeline STOPS here.
        # ECS Deploy in Stage 4 is never triggered.
        # ══════════════════════════════
        - Name: Test
          Actions:
            - Name: RunTests
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref BookVaultTestProject
              InputArtifacts:
                - Name: BuildOutput      # Receives full source + imagedefinitions.json
              OutputArtifacts:
                - Name: TestOutput       # Passes imagedefinitions.json to Deploy stage
              RunOrder: 1

        # ══════════════════════════════
        # STAGE 4 — DEPLOY
        # Only runs if Stage 3 (Test) succeeds.
        # Deploys the exact image built in Stage 2.
        # ══════════════════════════════
        - Name: Deploy
          Actions:
            - Name: DeployToECS
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: '1'
              Configuration:
                ClusterName: !Ref ECSClusterName
                ServiceName: !Ref ECSServiceName
                FileName: imagedefinitions.json
              InputArtifacts:
                - Name: TestOutput       # Uses artifact from Test stage (not Build directly)
              RunOrder: 1

  # ─────────────────────────────────────────
  # GitHub Webhook — triggers pipeline on push
  # ─────────────────────────────────────────
  GitHubWebhook:
    Type: AWS::CodePipeline::Webhook
    Properties:
      Name: bookvault-github-webhook
      TargetPipeline: !Ref BookVaultPipeline
      TargetAction: GitHubSource
      TargetPipelineVersion: 1
      RegisterWithThirdParty: true
      Authentication: GITHUB_HMAC
      AuthenticationConfiguration:
        SecretToken: !Sub "{{resolve:secretsmanager:${GitHubSecretName}:SecretString:token}}"
      Filters:
        - JsonPath: "$.ref"
          MatchEquals: "refs/heads/{Branch}"

Outputs:
  PipelineName:
    Description: CodePipeline Name
    Value: !Ref BookVaultPipeline

  PipelineArn:
    Description: CodePipeline ARN
    Value: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${BookVaultPipeline}

  TestProjectName:
    Description: CodeBuild Test Project Name
    Value: !Ref BookVaultTestProject
    Export:
      Name: bookvault-codebuild-test-name

  ArtifactBucketName:
    Description: S3 Artifact Bucket Name
    Value: !Ref PipelineArtifactBucket
